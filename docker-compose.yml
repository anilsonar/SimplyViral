version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: simplyviral-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: simplyviral_user
      POSTGRES_PASSWORD: simplyviral_password
      POSTGRES_DB: simplyviral_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
